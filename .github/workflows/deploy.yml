# 推送 main 时自动部署。Secrets：CLOUDFLARE_* 三个 + GH_TOKEN（可选，配置后每次部署会同步到 Worker 的 GITHUB_TOKEN）
name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then echo "Missing secret CLOUDFLARE_API_TOKEN"; exit 1; fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then echo "Missing secret CLOUDFLARE_ACCOUNT_ID"; exit 1; fi
          if [ -z "${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}" ]; then echo "Missing secret CLOUDFLARE_KV_NAMESPACE_ID (create KV in Cloudflare, then add its id here)"; exit 1; fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm install

      - name: Embed static assets for Worker
        run: node build-embed-assets.js

      - name: Inject secrets into wrangler.toml
        run: |
          sed -i.bak 's|REPLACE_WITH_KV_NAMESPACE_ID|'"${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}"'|g' wrangler.toml

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync GH_TOKEN to Worker (as GITHUB_TOKEN)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            printf '%s' "$GH_TOKEN" | npx wrangler secret put GITHUB_TOKEN
          fi

      - name: Sync OAuth credentials to Worker (optional, for GitHub 登录)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        run: |
          if [ -n "$GH_OAUTH_CLIENT_ID" ]; then
            printf '%s' "$GH_OAUTH_CLIENT_ID" | npx wrangler secret put GITHUB_OAUTH_CLIENT_ID
          fi
          if [ -n "$GH_OAUTH_CLIENT_SECRET" ]; then
            printf '%s' "$GH_OAUTH_CLIENT_SECRET" | npx wrangler secret put GITHUB_OAUTH_CLIENT_SECRET
          fi
