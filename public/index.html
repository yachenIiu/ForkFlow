<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fork 仓库同步管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-title">
        <div class="github-logo" aria-hidden="true">
          <svg viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
              -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
              0-.87.31-1.59.82-2.15-.08-.2-.36-1.01.08-2.11 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09
              2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.91.08 2.11.51.56.82 1.27.82 2.15
              0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2
              0 .21.15.46.55.38A8.012 8.012 0 0016 8c0-4.42-3.58-8-8-8z" />
          </svg>
        </div>
        <h1>Fork 仓库同步</h1>
      </div>
      <p class="subtitle">管理并一键同步 GitHub Fork 与上游仓库</p>
      <div class="actions">
        <button type="button" class="btn btn-primary" id="syncAllBtn">一键批量同步</button>
        <button type="button" class="btn btn-secondary" id="importForksBtn">一键导入所有 Fork 仓库</button>
        <button type="button" class="btn btn-secondary" id="addOpenBtn">添加仓库</button>
      </div>
    </header>

    <div class="toast" id="toast" aria-live="polite"></div>

    <!-- 通用确认弹框 -->
    <div class="modal-backdrop" id="confirmModal" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <div class="modal-header">
          <h2 id="confirmTitle">请确认操作</h2>
        </div>
        <div class="modal-body" id="confirmMessage">
          是否继续当前操作？
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" id="confirmCancelBtn">取消</button>
          <button type="button" class="btn btn-primary btn-sm" id="confirmOkBtn">确认</button>
        </div>
      </div>
    </div>

    <!-- 刷新 Loading 弹框 -->
    <div class="modal-backdrop" id="loadingModal" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="loadingTitle">
        <div class="modal-header">
          <h2 id="loadingTitle">正在刷新仓库信息</h2>
        </div>
        <div class="modal-body">
          <div class="loading-row">
            <div class="spinner" aria-hidden="true"></div>
            <div class="loading-text" id="loadingMessage">
              正在调用 GitHub API 获取最新时间和 commit，这可能需要一点时间…
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" id="loadingCancelBtn">取消本次刷新</button>
        </div>
      </div>
    </div>

    <section class="add-section collapsed" id="addSection">
      <h2>添加 Fork 仓库</h2>
      <form id="addForm" class="form">
        <div class="form-row">
          <label for="owner">Owner（可选）</label>
          <input id="owner" name="owner" placeholder="留空则使用当前 Token 对应的 GitHub 用户名" />
        </div>
        <div class="form-row">
          <label for="repo">Repo</label>
          <input id="repo" name="repo" placeholder="例如: my-fork" required />
        </div>
        <div class="form-row">
          <label for="branch">分支</label>
          <input id="branch" name="branch" placeholder="main" value="main" />
        </div>
        <div class="form-row">
          <label for="label">显示名称（可选）</label>
          <input id="label" name="label" placeholder="留空则用 owner/repo" />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">添加</button>
          <button type="button" class="btn btn-ghost" id="addCancelBtn">取消</button>
        </div>
      </form>
    </section>

    <section class="list-section">
      <div class="list-header">
        <div class="list-header-top">
          <h2>已配置的仓库</h2>
        </div>
        <div class="list-header-actions">
          <input id="searchInput" class="search-input" placeholder="owner / repo / branch" />
          <button type="button" class="btn btn-secondary btn-sm" id="refreshMetaBtn">刷新仓库信息</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>上游</th>
              <th>当前</th>
              <th>分支</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="repoList">
            <tr class="empty" id="emptyRow">
              <td colspan="4">暂无仓库，请先添加 Fork 仓库</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" class="pagination"></div>
      <div class="batch-result" id="batchResult"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
